# Production-flavoured stack: builds the app from this repo and wires it to
# Postgres + MinIO. Bring your own secrets via a `.env` file alongside this
# compose file (see `.env.example`).
#
# Usage:
#   cp .env.example .env       # then edit secrets
#   docker compose -f compose.prod.yml up -d --build
#
# A one-shot `migrate` service runs `prisma migrate deploy` before the app
# starts. Postgres data and MinIO objects persist in named volumes.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hooksfyi}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hooks} -d ${POSTGRES_DB:-hooksfyi}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY in .env}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-hooks-fyi}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY" &&
        mc mb --ignore-existing local/"$$S3_BUCKET" &&
        echo "MinIO bucket $$S3_BUCKET ready"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hooks}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hooksfyi}?schema=public

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hooks}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hooksfyi}?schema=public
      S3_ENDPOINT: ${S3_INTERNAL_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-hooks-fyi}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: "true"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL in .env}
      HOOK_PUBLIC_HOST: ${HOOK_PUBLIC_HOST:?set HOOK_PUBLIC_HOST in .env}
      MAX_BODY_BYTES: ${MAX_BODY_BYTES:-1048576}
      MAX_FILE_BYTES: ${MAX_FILE_BYTES:-52428800}

volumes:
  postgres-data:
  minio-data:
