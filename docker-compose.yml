services:
  postgres:
    image: postgres:16-alpine
    container_name: hooksfyi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hooks
      POSTGRES_PASSWORD: hooks
      POSTGRES_DB: hooksfyi
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hooks -d hooksfyi"]
      interval: 2s
      timeout: 2s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: hooksfyi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hooksminio
      MINIO_ROOT_PASSWORD: hooksminio
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: hooksfyi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro

  redis:
    image: redis:7-alpine
    container_name: hooksfyi-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  postgres-data:
  minio-data:
  redis-data:
